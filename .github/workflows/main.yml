name: main

on:
  push:
    branches:
      - "crowdbotics"
    tags-ignore:
      - "**"

permissions:
  actions: write
  checks: write
  contents: write
  statuses: write
  deployments: write

env:
  NODE_ENV: production

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    concurrency:
      group: ${{ github.workflow }}-update-cache
      cancel-in-progress: true
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: bootstrap
        uses: ./.github/actions/bootstrap

      - name: generate
        run: yarn ci:generate

      - name: typecheck
        run: yarn ci:typecheck

      - name: build
        run: yarn ci:build

      - name: test
        env:
          NODE_ENV: test
        run: yarn ci:test

      - name: typecheck apps
        run: yarn turbo run typecheck --filter='./apps/*'

  release:
    uses: ./.github/workflows/release.yaml
    if: "contains(github.event.head_commit.message, 'chore: release')"
    needs: build
    concurrency:
      group: ${{ github.workflow }}-release
    secrets: inherit
